# ─── DUBLID configuration for Gaussian blur (blind deblurring) ───

data:
  dataset_type: "synthetic"          # "synthetic" | "precomputed"
  train_image_dir: ""                # directory with clean training images
  train_kernel_dir: ""               # not used for Gaussian blur
  test_dir: ""                       # directory with blurred/sharp/kernel subdirs
  image_channels: 1                  # 1 for grayscale, 3 for RGB
  batch_size: 16
  num_workers: 12

  # Synthetic dataset parameters
  patch_size: [256, 256]
  blur_type: "gaussian"
  sigma_min: 0.8
  sigma_max: 4.0
  noise_stddev: 0.01
  noise_prob: 0.0
  grad_thr: 0.05
  thr_ratio: 0.06

model:
  type: "gaussian"                   # "motion" | "gaussian"
  C: 16
  K: 3
  num_layers: 10
  kernel_size: [21, 21]              # smaller for Gaussian (compact kernels)
  bias_init: 0.02
  zeta_init: 1.0
  eta_init: 1.0
  prox_scale: 10.0
  kernel_prox_init: 1.0
  kernel_bias_init: 0.0
  kernel_scale: 100.0
  kernel_bias_scale: 0.01
  epsilon: 1.0e-8
  sigma_init: 2.0                    # initial Gaussian kernel sigma
  checkpoint: null

loss:
  image_loss: "l2"
  kernel_weight: 100.0
  weight_decay: 0.01
  kernel_loss_type: "l2"

train:
  epochs: 200
  lr: 1.0e-4
  scheduler: "step"
  step_size: 50
  gamma: 0.5
  grad_clip_theta: 0.001
  seed: 42
  gpus: "0"
  log_every: 20
  val_every: 1
  save_every: 1

test:
  batch_size: 1
  save_images: true
  remove_small_objects: false        # not needed for Gaussian kernels
  min_object_size: 8
