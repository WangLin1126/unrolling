# ─── DUBLID configuration for motion blur (blind deblurring) ───

data:
  dataset_type: "synthetic"          # "synthetic" | "precomputed"
  train_image_dir: "/inspire/hdd/global_user/gexinmu-253108100065/Repos/waitlist/unrolling_deblur/datasets/DIV2K_train_256_random_5/"                # directory with clean training images
  train_kernel_dir: ""               # optional: directory with motion kernel images
  test_dir: "/inspire/hdd/global_user/gexinmu-253108100065/Repos/waitlist/unrolling_deblur/datasets/DIV2K_valid_256_random_5/"                       # directory with blurred/sharp/kernel subdirs
  image_channels: 1                  # 1 for grayscale, 3 for RGB
  batch_size: 128
  num_workers: 12

  # Synthetic dataset parameters
  patch_size: [256, 256]             # valid region size (Hv, Wv)
  blur_type: "motion"               # "motion" | "gaussian"
  angle_min: 0.0
  angle_max: 360.0
  length_min: 5.0
  length_max: 30.0
  noise_stddev: 0.01
  noise_prob: 0.0                    # probability of adding noise
  grad_thr: 0.05                     # edge detection threshold
  thr_ratio: 0.06                    # min fraction of edge pixels

model:
  type: "motion"                     # "motion" | "gaussian"
  C: 16                              # number of feature maps
  K: 3                               # conv filter spatial size
  num_layers: 10                     # number of unrolled layers
  kernel_size: [45, 45]              # blur kernel bounding box
  bias_init: 0.02                    # initial thresholding bias
  zeta_init: 1.0                     # initial feature update proximity
  eta_init: 1.0                      # initial reconstruction proximity
  prox_scale: 10.0                   # proximity parameter scaling
  kernel_prox_init: 1.0              # initial kernel update step size
  kernel_bias_init: 0.0              # initial kernel normalization bias
  kernel_scale: 100.0                # logsumexp temperature
  kernel_bias_scale: 0.01            # kernel bias scaling
  epsilon: 1.0e-8                    # numerical stability constant
  checkpoint: null                   # path to checkpoint for resume

loss:
  image_loss: "l2"                   # "l2" | "l1" | "charbonnier"
  kernel_weight: 100.0               # kappa: weight for kernel loss
  weight_decay: 0.01                 # alpha: L2 weight decay on conv filters
  kernel_loss_type: "l2"             # "l2" | "l1"

train:
  epochs: 200
  lr: 5.0e-4
  scheduler: "step"                  # "step" | "cosine"
  step_size: 50                      # StepLR: decay every N epochs
  gamma: 0.5                         # StepLR: decay factor
  grad_clip_theta: 0.001             # gradient clipping: max_grad = theta / lr
  seed: 42
  gpus: "0"                          # e.g. "0,1,2,3"
  log_every: 10                      # log every N iterations
  val_every: 1                       # validate every N epochs
  save_every: 10                      # save checkpoint every N epochs

test:
  batch_size: 8
  save_images: true
  remove_small_objects: true
  min_object_size: 8                 # minimum connected component size in kernel
